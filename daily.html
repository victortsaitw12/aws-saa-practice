<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>每日背題計畫 – AWS SAA-C03 練習</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">☁️ AWS SAA-C03 練習</span>
    <nav class="nav-tabs">
      <a href="index.html" class="nav-tab">首頁</a>
      <a href="daily.html" class="nav-tab active">每日背題</a>
      <a href="practice.html" class="nav-tab">自由練習</a>
    </nav>
  </div>
</header>

<main id="app">

  <!-- START SCREEN -->
  <section id="startScreen" class="screen">
    <div class="card daily-card">
      <h2 class="daily-title">📅 每日背題計畫</h2>
      <p class="daily-status" id="dailyStatus">載入中…</p>

      <div class="progress-bar daily-progress-bar"><div id="dailyProgressFill" class="progress-fill"></div></div>
      <p class="daily-progress-text" id="dailyProgressText"></p>

      <div class="daily-meta-row">
        <span id="dailyStreak"></span>
        <span>
          <button id="dailyHistoryToggle" class="link-btn">查看歷史紀錄</button>
          ・
          <button id="dailyResetBtn" class="link-btn">重設每日進度</button>
        </span>
      </div>

      <div id="dailyHistoryPanel" class="daily-history-panel hidden"></div>

      <button id="dailyStartBtn" class="btn btn-primary btn-large">開始今天的10題</button>
    </div>
  </section>

  <!-- QUIZ SCREEN -->
  <section id="quizScreen" class="screen hidden">
    <div class="quiz-header">
      <button id="quitBtn" class="btn btn-ghost btn-small">← 結束本次練習</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <span id="progressText" class="progress-text"></span>
      </div>
      <div class="score-live">得分 <strong id="liveScore">0</strong></div>
    </div>

    <div class="card question-card">
      <div class="q-meta">
        <span class="q-number" id="qNumber"></span>
        <button id="bookmarkBtn" class="bookmark-btn" title="標記此題">☆</button>
      </div>
      <p class="q-text" id="qText"></p>
      <p class="q-choose-hint" id="qChooseHint"></p>
      <div id="optionsList" class="options-list"></div>

      <div class="answer-actions">
        <button id="submitBtn" class="btn btn-primary" disabled>提交答案</button>
        <button id="nextBtn" class="btn btn-primary hidden">下一題 →</button>
      </div>

      <div id="feedback" class="feedback hidden"></div>
    </div>
  </section>

  <!-- RESULT SCREEN -->
  <section id="resultScreen" class="screen hidden">
    <div class="card result-card">
      <h2>練習結果</h2>
      <div class="result-score" id="resultScore"></div>
      <div class="result-bar-wrap"><div id="resultBarFill" class="result-bar-fill"></div></div>
      <div id="missedList" class="missed-list"></div>
      <div class="result-actions">
        <button id="reviewMissedBtn" class="btn btn-primary hidden">複習答錯的題目</button>
        <button id="backHomeBtn" class="btn btn-ghost">回今日進度</button>
      </div>
    </div>
  </section>

</main>

<footer class="site-footer">
  題目內容取自 ExamTopics 公開題庫，僅供個人練習使用。
</footer>

<script src="js/app.js"></script>
</body>
</html>
