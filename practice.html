<!doctype html>
<html lang="zh-Hant">
<head>
<script>
(function(){
  try {
    if (localStorage.getItem("saa_auth_v1") === "1") {
      document.documentElement.classList.add("auth-ok");
    }
  } catch (e) {}
})();
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#232f3e" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0f141c" media="(prefers-color-scheme: dark)" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SAA練習" />
<meta name="format-detection" content="telephone=no" />
<title>自由練習 – AWS SAA-C03 練習</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23232f3e%22/><text x=%2250%22 y=%2262%22 font-size=%2255%22 text-anchor=%22middle%22>☁️</text></svg>" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="css/style.css?v=20260717" />
</head>
<body>

<div id="authGate" class="auth-gate">
  <form id="authForm" class="card auth-box">
    <h2>🔒 需要密碼</h2>
    <p class="subtitle">請輸入密碼以繼續使用</p>
    <input type="password" id="authInput" class="auth-input" placeholder="密碼" autocomplete="current-password" required />
    <button type="submit" class="btn btn-primary btn-large">進入</button>
    <p id="authError" class="auth-error hidden">密碼錯誤，請再試一次</p>
  </form>
</div>

<div id="siteContent">
<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">☁️ AWS SAA-C03 練習</span>
    <nav class="nav-tabs">
      <a href="index.html" class="nav-tab">首頁</a>
      <a href="daily.html" class="nav-tab">每日背題</a>
      <a href="practice.html" class="nav-tab active">自由練習</a>
    </nav>
    <button id="logoutBtn" class="logout-btn" title="登出">登出</button>
  </div>
</header>

<main id="app">

  <!-- START SCREEN -->
  <section id="startScreen" class="screen">
    <div class="card start-card">
      <h1>🎯 自由練習</h1>
      <p class="subtitle">題庫共 <strong id="totalCount">–</strong> 題，資料來源：ExamTopics SAA-C03</p>

      <div class="field-group">
        <label>練習模式</label>
        <div class="radio-row" id="modeSelect">
          <label class="radio-pill"><input type="radio" name="mode" value="random" checked><span>隨機出題</span></label>
          <label class="radio-pill"><input type="radio" name="mode" value="sequential"><span>依題號順序</span></label>
          <label class="radio-pill"><input type="radio" name="mode" value="wrong"><span>只練錯過的題目</span></label>
          <label class="radio-pill"><input type="radio" name="mode" value="bookmark"><span>只練標記的題目</span></label>
          <label class="radio-pill"><input type="radio" name="mode" value="unseen"><span>只練沒做過的題目</span></label>
        </div>
      </div>

      <div class="field-group" id="countGroup">
        <label>題數</label>
        <div class="radio-row" id="countSelect">
          <label class="radio-pill"><input type="radio" name="count" value="10"><span>10</span></label>
          <label class="radio-pill"><input type="radio" name="count" value="20" checked><span>20</span></label>
          <label class="radio-pill"><input type="radio" name="count" value="50"><span>50</span></label>
          <label class="radio-pill"><input type="radio" name="count" value="65"><span>65（正式考試題數）</span></label>
          <label class="radio-pill"><input type="radio" name="count" value="all"><span>全部</span></label>
        </div>
      </div>

      <button id="startBtn" class="btn btn-primary btn-large">開始練習</button>

      <p id="modeHint" class="hint"></p>
    </div>
  </section>

  <!-- QUIZ SCREEN -->
  <section id="quizScreen" class="screen hidden">
    <div class="quiz-header">
      <button id="quitBtn" class="btn btn-ghost btn-small">← 結束本次練習</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <span id="progressText" class="progress-text"></span>
      </div>
      <div class="score-live">得分 <strong id="liveScore">0</strong></div>
    </div>

    <div class="card question-card">
      <div class="q-meta">
        <span class="q-number" id="qNumber"></span>
        <button id="bookmarkBtn" class="bookmark-btn" title="標記此題">☆</button>
      </div>
      <p class="q-text" id="qText"></p>
      <p class="q-choose-hint" id="qChooseHint"></p>
      <div id="optionsList" class="options-list"></div>

      <div class="answer-actions">
        <button id="submitBtn" class="btn btn-primary" disabled>提交答案</button>
        <button id="nextBtn" class="btn btn-primary hidden">下一題 →</button>
      </div>

      <div id="feedback" class="feedback hidden"></div>
    </div>
  </section>

  <!-- RESULT SCREEN -->
  <section id="resultScreen" class="screen hidden">
    <div class="card result-card">
      <h2>練習結果</h2>
      <div class="result-score" id="resultScore"></div>
      <div class="result-bar-wrap"><div id="resultBarFill" class="result-bar-fill"></div></div>
      <div id="missedList" class="missed-list"></div>
      <div class="result-actions">
        <button id="reviewMissedBtn" class="btn btn-primary hidden">複習答錯的題目</button>
        <button id="backHomeBtn" class="btn btn-ghost">回練習設定</button>
      </div>
    </div>
  </section>

</main>

<footer class="site-footer">
  題目內容取自 ExamTopics 公開題庫，僅供個人練習使用。
</footer>
</div>

<script src="js/app.js?v=20260717"></script>
</body>
</html>
