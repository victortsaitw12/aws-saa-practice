<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#232f3e" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0f141c" media="(prefers-color-scheme: dark)" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SAA練習" />
<meta name="format-detection" content="telephone=no" />
<title>AWS SAA-C03 模擬考題練習</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23232f3e%22/><text x=%2250%22 y=%2262%22 font-size=%2255%22 text-anchor=%22middle%22>☁️</text></svg>" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">☁️ AWS SAA-C03 練習</span>
    <nav class="nav-tabs">
      <a href="index.html" class="nav-tab active">首頁</a>
      <a href="daily.html" class="nav-tab">每日背題</a>
      <a href="practice.html" class="nav-tab">自由練習</a>
    </nav>
  </div>
</header>

<main id="app">

  <div class="card home-card">
    <h1>AWS Certified Solutions Architect – Associate<br>模擬考題練習</h1>
    <p class="subtitle">題庫共 <strong id="totalCount">–</strong> 題，資料來源：ExamTopics SAA-C03</p>

    <div class="stats-panel">
      <div class="stat-box">
        <div class="stat-value" id="statAttempted">0</div>
        <div class="stat-label">已作答題目</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statAccuracy">–</div>
        <div class="stat-label">整體正確率</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statWrong">0</div>
        <div class="stat-label">尚待加強</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statBookmark">0</div>
        <div class="stat-label">已標記</div>
      </div>
    </div>
    <button id="resetStatsBtn" class="btn btn-ghost btn-small">清除練習正確率紀錄</button>
  </div>

  <div class="nav-cards">
    <a href="daily.html" class="card nav-card">
      <h2>📅 每日背題計畫</h2>
      <p id="homeDailyStatus" class="nav-card-status">載入中…</p>
      <div class="progress-bar"><div id="homeDailyProgressFill" class="progress-fill"></div></div>
      <p class="nav-card-hint" id="homeDailyStreak"></p>
      <span class="btn btn-primary nav-card-btn">前往每日背題 →</span>
    </a>

    <a href="practice.html" class="card nav-card">
      <h2>🎯 自由練習</h2>
      <p class="nav-card-status">隨機出題、依題號順序、只練錯過 / 標記 / 沒做過的題目，自由選擇題數練習。</p>
      <span class="btn btn-primary nav-card-btn">前往自由練習 →</span>
    </a>
  </div>

</main>

<footer class="site-footer">
  題目內容取自 ExamTopics 公開題庫，僅供個人練習使用。
</footer>

<script src="js/app.js"></script>
</body>
</html>
